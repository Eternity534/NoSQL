services:
  app:
    build: .
    restart: always
    ports:
      - "8080:8080"
  mongo:
    image: mongo:6.0
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER} 
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    ports: 
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    
  neo4j:
    image: neo4j:5.26.22-community-ubi9
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
    ports:
      - "7474:7474"  # Port pour l'interface web
      - "7687:7687"  # Port pour Bolt
    volumes:
      - neo4j_data:/data/:rw
      - neo4j_conf:/conf:ro

volumes:
  mongo_data:
  neo4j_data:
  neo4j_conf:
